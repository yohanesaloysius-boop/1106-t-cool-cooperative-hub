# ============================================================
# Contoh konfigurasi Nginx untuk T-COOL Cooperative Hub
# Stack: Node.js (TanStack Start) di belakang Nginx reverse proxy
# ============================================================
# 1) Build:   npm run build
# 2) Jalankan server Node (PM2 disarankan): pm2 start .output/server/index.mjs --name tcool
#    (port default 3000 — sesuaikan dengan output build kamu)
# 3) Pasang file ini di /etc/nginx/sites-available/tcool lalu symlink ke sites-enabled
# 4) Pasang SSL via certbot (Let's Encrypt)

server {
    listen 80;
    server_name domain-anda.com www.domain-anda.com;
    # Redirect semua HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name domain-anda.com www.domain-anda.com;

    ssl_certificate     /etc/letsencrypt/live/domain-anda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain-anda.com/privkey.pem;

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---------- Reverse proxy ke Node server ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 25M;
}
